name: Build & Release APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
            # Compute versionCode from tag (e.g. 1.2.3 -> 10203)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
            CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
            echo "code=$CODE" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "code=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject version into gradle.properties
        run: |
          sed -i "s/APP_VERSION_NAME=.*/APP_VERSION_NAME=${{ steps.version.outputs.name }}/" gradle.properties
          sed -i "s/APP_VERSION_CODE=.*/APP_VERSION_CODE=${{ steps.version.outputs.code }}/" gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk PhotoSweep-v${{ steps.version.outputs.name }}-debug.apk
          cp app/build/outputs/apk/release/app-release.apk PhotoSweep-v${{ steps.version.outputs.name }}-release.apk

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSweep-v${{ steps.version.outputs.name }}-debug
          path: PhotoSweep-v${{ steps.version.outputs.name }}-debug.apk

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSweep-v${{ steps.version.outputs.name }}-release
          path: PhotoSweep-v${{ steps.version.outputs.name }}-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PhotoSweep ${{ steps.version.outputs.name }}
          files: |
            PhotoSweep-v${{ steps.version.outputs.name }}-debug.apk
            PhotoSweep-v${{ steps.version.outputs.name }}-release.apk
          generate_release_notes: true
